  <!-- Own copy of the sprite: 404.html is a separate document, so it cannot
       <use> the one in index.html. ~2 kB, and this page has no script that
       could inject it. -->
  <figure class="specimen404">
    <svg class="mogger" viewBox="0 0 240 300" role="img"
         aria-label="Line drawing of a cockroach in sunglasses and a tie at a lectern">
    <g class="mogger__ink">
      <!-- antennae, swept up and out -->
      <path d="M107 42 C90 16 60 2 30 0" />
      <path d="M133 42 C150 16 180 2 210 0" />
      <!-- head: round enough to carry the aviators, which are the whole tell -->
      <path d="M120 28 C100 28 88 41 88 58 C88 75 102 86 120 86 C138 86 152 75 152 58 C152 41 140 28 120 28 Z" />
      <!-- pronotum -->
      <path d="M120 82 C94 82 76 94 76 112 C76 128 96 136 120 136 C144 136 164 128 164 112 C164 94 146 82 120 82 Z" />
      <!-- abdomen, lower half hidden by the lectern when it is drawn -->
      <path d="M120 132 C102 132 92 148 92 172 C92 194 104 208 120 208 C136 208 148 194 148 172 C148 148 138 132 120 132 Z" />
      <path class="cx" d="M96 158 H144 M93 180 H147" />

      <path d="M78 120 L40 128 L18 144 L12 156" />
      <path d="M58 124 l-3 -8 M32 138 l-5 -6" />
      <path d="M162 120 L200 128 L222 144 L228 156" />

         bands, drawn heavier than the anatomy so the cross reads at a glance

      <path d="M86 112 L97 133 L152 145 L161 151" />

         read as wearing sunglasses rather than having very large eyes. -->

      <path d="M91 48 L116 45 L118 57 C115 69 97 72 91 63 C88 59 88 51 91 48 Z" />
      <path d="M149 48 L124 45 L122 57 C125 69 143 72 149 63 C152 59 152 51 149 48 Z" />
