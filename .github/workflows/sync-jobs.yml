name: Sync job index

# Ingest runs HERE, not in the Worker.
#
# The Workers Free plan allows 10 ms of CPU per invocation — cron triggers
# included, which is not obvious and is why the original all-boards sweep failed
# in production with a bare `1102` while looking fine in local dev. Node has no
# such limit, so the full 19-board sweep runs here and the Worker only serves
# reads.
#
# The Worker's own cron still runs: it handles purgeExpired() (session and
# oauth_state cleanup, which this workflow cannot do) plus one board as a
# fallback if Actions is ever disabled.

on:
  schedule:
    # Every 6 hours. NOT hourly — see the write-quota note below.
    # Minute 40 keeps it clear of the Worker cron at :17.
    - cron: "40 */6 * * *"
  workflow_dispatch: # manual run from the Actions tab

# WRITE QUOTA — the reason this sweep is shaped the way it is.
#
# D1 free allows 100,000 rows written/day. Before change detection, one full
# sweep wrote ~20,000 — every row, every run, almost all of it to record that
# nothing had changed. At 4 runs/day that was ~80,000 plus the Worker cron's own
# board: roughly 80% of quota, with no room to add a board.
#
# Measured on production 2026-07-23: updating ONE jobs row costs 8 rows written.
# That is index maintenance (jobs carries seven indexes), not the FTS triggers —
# an earlier note here blamed FTS for the bulk and was wrong.
#
# Change detection landed in migrations/0004. Each posting carries an FNV-1a
# hash of every column the upsert writes (jobHash in worker/normalize.js), and
# the upsert's WHERE clause skips the row entirely unless the content changed,
# the posting is being reopened, or its ~20h heartbeat is due. The FTS trigger
# additionally only fires when title/company/jd actually differ.
#
# Measured on production: 50 unchanged rows re-upserted wrote 400 the first time
# (hashes being filled in) and then 0, twice. Expect the ingest to sit near
# ~19,000 writes/day rather than ~80,000.
#
# The first sweep after that migration is the expensive one — jd_hash starts
# NULL, so every posting counts as changed exactly once.
#
# THE ONE THING NOT TO GET WRONG: last_seen is now only refreshed every ~20h,
# so closure detection compares against a 48h cutoff, not this run's timestamp.
# Comparing against `now` would close the entire live corpus. The two windows
# live together in worker/normalize.js and there is a test asserting they cannot
# cross.
#
# Even so this is a 19x freshness win: the Worker cron refreshes ONE board per
# 6 hours (a ~5 day cycle for all 19); this refreshes ALL of them.

concurrency:
  group: sync-jobs
  cancel-in-progress: false # never interrupt a half-applied sweep

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # No `npm ci`. tools/seed.mjs imports only worker/sources.js and
      # worker/normalize.js, both dependency-free, and uses global fetch. The
      # lockfile is generated on Windows so it omits the Linux esbuild binaries
      # and `npm ci` fails outright — installing nothing is both correct and
      # faster. wrangler is fetched on demand below, pinned for reproducibility.

      # Fetches all 19 public ATS boards, applies the title filter, normalises,
      # and emits SQL. Exits non-zero if the sweep looks broken (< 200 jobs),
      # which leaves the existing corpus untouched rather than zeroing facets.
      - name: Sweep boards
        run: node tools/seed.mjs > seed.sql

      - name: Report sweep size
        run: |
          echo "statements: $(wc -l < seed.sql)"
          echo "size: $(du -h seed.sql | cut -f1)"

      - name: Apply to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.113.0 d1 execute moggers --remote --file=seed.sql -y

      - name: Verify the live index
        run: |
          total=$(curl -sf https://moggers.in/api/facets | node -e \
            "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).total))")
          echo "live total: $total"
          # A sweep that leaves the site reporting nothing is a failed sweep.
          if [ "$total" -lt 200 ]; then
            echo "::error::live index reports $total roles — expected >= 200"
            exit 1
          fi
